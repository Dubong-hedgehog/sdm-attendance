<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<title>SDM 출석체크</title>
<link rel="manifest" href="manifest.json">
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e43bd5dd9429b044cbd54d3fdb1bc13a&libraries=services"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #F0F4F2; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
  .card { background: #fff; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }

  /* 앱 헤더 */
  .app-header { background: linear-gradient(135deg, #1D9E75 0%, #0a7a56 100%); padding: 20px 20px 16px; }
  .app-title { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .app-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  /* 다음 활동 카드 */
  .next-activity-card { background: rgba(255,255,255,0.15); border-radius: 14px; padding: 14px; margin-top: 14px; backdrop-filter: blur(4px); }
  .next-activity-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .next-activity-name { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.3px; }
  .next-activity-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dday-badge { background: #fff; color: #1D9E75; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 800; }
  .dday-badge.past { background: rgba(255,255,255,0.3); color: #fff; }
  .next-activity-date { font-size: 13px; color: rgba(255,255,255,0.85); }
  .next-activity-location { font-size: 12px; color: rgba(255,255,255,0.75); margin-bottom: 10px; }
  .map-container { border-radius: 10px; overflow: hidden; height: 130px; }
  .map-container #kakao-map { width: 100%; height: 100%; }

  /* 탭 */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #f0f0f0; padding: 0 20px; }
  .tab { flex: 1; padding: 14px 6px; text-align: center; font-size: 13px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: #1D9E75; border-bottom-color: #1D9E75; font-weight: 700; }

  /* 본문 */
  .section { display: none; padding: 20px; }
  .section.active { display: block; }

  /* 폼 */
  label { font-size: 12px; font-weight: 600; color: #999; display: block; margin-bottom: 6px; margin-top: 16px; letter-spacing: 0.3px; text-transform: uppercase; }
  input[type=text], select { width: 100%; padding: 13px 16px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; outline: none; transition: border 0.2s; background: #fff; appearance: none; -webkit-appearance: none; color: #222; }
  input[type=text]:focus, select:focus { border-color: #1D9E75; background: #f9fffe; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; font-size: 13px; }

  /* 체크박스 */
  .checkbox-group { margin-top: 16px; }
  .checkbox-group p { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 8px; letter-spacing: 0.3px; text-transform: uppercase; }
  .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1.5px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: border 0.2s; }
  .checkbox-item:has(input:checked) { border-color: #1D9E75; background: #f9fffe; }
  .checkbox-item input { width: 18px; height: 18px; accent-color: #1D9E75; }
  .checkbox-item label { font-size: 14px; color: #333; margin: 0; cursor: pointer; font-weight: 500; }

  /* 버튼 */
  .btn { width: 100%; padding: 15px; background: #1D9E75; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 20px; cursor: pointer; transition: all 0.2s; letter-spacing: -0.2px; }
  .btn:active { background: #0F6E56; transform: scale(0.99); }
  .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-outline-red { background: #fff; color: #E24B4A; border: 1.5px solid #E24B4A; }
  .btn-outline-red:active { background: #FCEBEB; }

  /* 메시지 */
  .msg { text-align: center; padding: 12px; border-radius: 12px; font-size: 14px; margin-top: 14px; display: none; font-weight: 500; }
  .msg.success { background: #E1F5EE; color: #0F6E56; display: block; }
  .msg.error { background: #FCEBEB; color: #A32D2D; display: block; }

  /* 성공 화면 */
  .success-screen { text-align: center; padding: 20px 0; display: none; }
  .success-screen.show { display: block; }
  .success-icon { width: 64px; height: 64px; background: #E1F5EE; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 30px; }
  .success-screen h2 { font-size: 20px; color: #1D9E75; margin-bottom: 8px; font-weight: 800; }
  .success-screen p { font-size: 14px; color: #888; }
  .info-box { background: #f8f8f8; border-radius: 12px; padding: 14px; margin-top: 16px; }
  .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
  .info-row:last-child { border-bottom: none; }
  .info-row span:first-child { color: #aaa; font-size: 12px; }
  .info-row span:last-child { font-weight: 600; color: #222; }

  /* 안내 박스 */
  .notice-box { background: #FFFBEB; border: 1.5px solid #FDE68A; border-radius: 12px; padding: 12px 14px; margin-top: 12px; font-size: 13px; color: #92400E; display: none; }

  /* 마이페이지 카드 */
  .status-card { border: 1.5px solid #f0f0f0; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; transition: border 0.2s; }
  .status-card-title { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 4px; }
  .status-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
  .badge-green { background: #E1F5EE; color: #0F6E56; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-gray { background: #f0f0f0; color: #888; }
  .section-label { font-size: 12px; font-weight: 700; color: #999; margin: 16px 0 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .empty-state { text-align: center; padding: 24px 0; color: #ccc; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
 <div class="app-header">
    <div class="app-title">서대문 떡잎마을 방범대</div>
    <div class="app-subtitle">출석체크 · 사전신청</div>
    <div class="next-activity-card" id="next-activity-header">
      <div class="next-activity-label">📅 다음 활동</div>
      <div class="next-activity-name" id="next-activity-name">불러오는 중...</div>
      <div class="next-activity-meta">
        <span class="dday-badge" id="next-dday"></span>
        <span class="next-activity-date" id="next-activity-date"></span>
      </div>
      <div class="next-activity-location" id="next-activity-location"></div>
      <div class="map-container" id="map-container" style="display:none">
        <div id="kakao-map"></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('attend')">출석체크</div>
    <div class="tab" onclick="switchTab('pre')">사전신청</div>
    <div class="tab" onclick="switchTab('my')">마이페이지</div>
  </div>

  <!-- 출석체크 -->
  <div class="section active" id="section-attend">
    <div id="attend-form">
      <label>활동 선택</label>
      <div class="select-wrap">
        <select id="attend-activity" onchange="onActivityChange()">
          <option value="">활동을 선택해주세요</option>
        </select>
      </div>
      <label>이름</label>
      <input type="text" id="attend-name" placeholder="홍길동">
      <label>전화번호 뒷 4자리</label>
      <input type="text" id="attend-phone" placeholder="1234" maxlength="4" inputmode="numeric">
      <div class="checkbox-group" id="sub-activity-group" style="display:none">
        <p>참여 항목 선택</p>
        <div id="sub-activity-list"></div>
      </div>
      <button class="btn" onclick="submitAttend()">출석 완료</button>
      <div class="msg" id="attend-msg"></div>
    </div>
    <div class="success-screen" id="attend-success">
      <div class="success-icon">✓</div>
      <h2>출석 완료!</h2>
      <p>참석이 확인되었어요</p>
      <div class="info-box" id="attend-info"></div>
    </div>
  </div>

  <!-- 사전신청 -->
  <div class="section" id="section-pre">
    <div id="pre-form">
      <label>활동 선택</label>
      <div class="select-wrap">
        <select id="pre-activity" onchange="onPreActivityChange()">
          <option value="">활동을 선택해주세요</option>
        </select>
      </div>
      <div class="notice-box" id="pre-notice"></div>
      <div class="checkbox-group" id="pre-sub-group" style="display:none">
        <p>참여 항목 선택</p>
        <div id="pre-sub-list"></div>
      </div>
      <label>이름</label>
      <input type="text" id="pre-name" placeholder="홍길동">
      <label>전화번호 뒷 4자리</label>
      <input type="text" id="pre-phone" placeholder="1234" maxlength="4" inputmode="numeric">
      <button class="btn" onclick="submitPre()">신청 완료</button>
      <div class="msg" id="pre-msg"></div>
    </div>
    <div class="success-screen" id="pre-success">
      <div class="success-icon">✓</div>
      <h2>신청 완료!</h2>
      <p>사전 신청이 접수되었어요</p>
    </div>
  </div>

<!-- 마이페이지 -->
  <div class="section" id="section-my">
    <div id="my-form">
      <label>이름</label>
      <input type="text" id="my-name" placeholder="홍길동">
      <label>전화번호 뒷 4자리</label>
      <input type="text" id="my-phone" placeholder="1234" maxlength="4" inputmode="numeric">
      <button class="btn" onclick="loadMyStatus()">조회하기</button>
      <div class="msg" id="my-msg"></div>
    </div>
    <div id="my-status" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <p style="font-size:15px; font-weight:500;" id="my-name-display"></p>
        <button onclick="resetMyPage()" style="font-size:12px; color:#888; background:none; border:none; cursor:pointer;">다시조회</button>
      </div>
      <div id="my-gen-list"></div>
    </div>
  </div>

<script src="config.js"></script>
<script>
  let allActivities = [];

  async function api(body) {
    const res = await fetch(CONFIG.API_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return res.json();
  }

async function loadActivities() {
    try {
      const data = await api({ action: 'getActivities', generation: CONFIG.GENERATION });
      if (data.success) {
        allActivities = data.activities.filter(a =>
          String(a['활성화']).toUpperCase() === 'TRUE'
        );
        const attendSel = document.getElementById('attend-activity');
        const preSel = document.getElementById('pre-activity');
        if (allActivities.length === 0) {
          attendSel.innerHTML = '<option value="">현재 진행중인 활동이 없습니다</option>';
          preSel.innerHTML = '<option value="">현재 진행중인 활동이 없습니다</option>';
          return;
        }
        allActivities.forEach(act => {
          const rawDate = act['날짜'] ? String(act['날짜']).split('T')[0] : '';
          const label = `${act['활동명']} (${rawDate})`;
          attendSel.innerHTML += `<option value="${act['활동ID']}">${label}</option>`;
          preSel.innerHTML += `<option value="${act['활동ID']}">${label}</option>`;
        });
        const today = new Date(); today.setHours(0,0,0,0);
        const upcoming = data.activities
        .filter(a => new Date(String(a['날짜']).split('T')[0]) >= today)
        .sort((a, b) => new Date(String(a['날짜']).split('T')[0]) - new Date(String(b['날짜']).split('T')[0]));
        renderNextActivityHeader(upcoming[0] || null);
      }
    } catch(e) { console.error('활동 목록 로드 실패', e); }
  }

function renderNextActivityHeader(act) {
  const header = document.getElementById('next-activity-header');
  const nameEl = document.getElementById('next-activity-name');
  const ddayEl = document.getElementById('next-dday');
  const dateEl = document.getElementById('next-activity-date');
  const locEl = document.getElementById('next-activity-location');
  const mapContainer = document.getElementById('map-container');

  if (!act) {
    header.style.background = '#f0f0f0';
    nameEl.style.color = '#aaa';
    nameEl.textContent = '예정된 활동이 없습니다';
    ddayEl.style.display = 'none';
    return;
  }
  const rawDate = String(act['날짜']).split('T')[0];
  const actDate = new Date(rawDate); actDate.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((actDate - today) / (1000 * 60 * 60 * 24));

  nameEl.textContent = act['활동명'] || '';
  dateEl.textContent = rawDate.replace(/-/g, '.');

  if (diff === 0) {
    ddayEl.textContent = 'D-DAY';
    ddayEl.className = 'dday-badge today';
  } else if (diff > 0) {
    ddayEl.textContent = `D-${diff}`;
  } else {
    ddayEl.textContent = `D+${Math.abs(diff)}`;
    header.style.background = 'linear-gradient(135deg, #888 0%, #666 100%)';
  }
  const placeName = act['장소명'] || '';
  const address = act['주소'] || '';
  if (placeName || address) {
    locEl.innerHTML = `📍 ${placeName}${placeName && address ? ' · ' : ''}${address}`;
  }
  if (address && typeof kakao !== 'undefined') {
    mapContainer.style.display = 'block';
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(address, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
        const map = new kakao.maps.Map(document.getElementById('kakao-map'), { center: coords, level: 4 });
        new kakao.maps.Marker({ map, position: coords, title: placeName || address });
      } else {
        mapContainer.style.display = 'none';
      }
    });
  }
}
  function onActivityChange() {
    const activityId = document.getElementById('attend-activity').value;
    const group = document.getElementById('sub-activity-group');
    const list = document.getElementById('sub-activity-list');
    list.innerHTML = '';
    group.style.display = 'none';
    if (!activityId) return;
    const act = allActivities.find(a => a['활동ID'] === activityId);
    if (!act) return;
    const subItems = act['세부참여항목'];
    if (subItems && String(subItems).trim() !== '') {
      const items = String(subItems).split(',').map(s => s.trim()).filter(Boolean);
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        div.innerHTML = `<input type="checkbox" id="sub_${item}" value="${item}">
          <label for="sub_${item}">${item}</label>`;
        list.appendChild(div);
      });
      group.style.display = 'block';
    }
  }

function onPreActivityChange() {
    const activityId = document.getElementById('pre-activity').value;
    const noticeBox = document.getElementById('pre-notice');
    noticeBox.style.display = 'none';
    noticeBox.innerHTML = '';

    const preSubGroup = document.getElementById('pre-sub-group');
    const preSubList = document.getElementById('pre-sub-list');
    preSubList.innerHTML = '';
    preSubGroup.style.display = 'none';

    if (!activityId) return;
    const act = allActivities.find(a => a['활동ID'] === activityId);
    if (!act) return;

    // 사전신청용 세부항목 체크박스
    const subItems = act['세부참여항목'];
    if (subItems && String(subItems).trim() !== '') {
      const items = String(subItems).split(',').map(s => s.trim()).filter(Boolean);
      const subExtraRaw = act['세부항목추가금'] || '';
      const subExtraMap = {};
      if (subExtraRaw.trim() !== '') {
        subExtraRaw.split(',').forEach(item => {
          const [k, v] = item.split('=').map(s => s.trim());
          if (k && v !== undefined) subExtraMap[k] = parseInt(v);
        });
      }
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        const priceLabel = subExtraMap[item] !== undefined
          ? (subExtraMap[item] === 0 ? ' (무료)' : ` (+${subExtraMap[item].toLocaleString()}원)`)
          : '';
        div.innerHTML = `<input type="checkbox" id="presub_${item}" value="${item}">
          <label for="presub_${item}">${item}${priceLabel}</label>`;
        preSubList.appendChild(div);
      });
      preSubGroup.style.display = 'block';
    }

    // 활동 전체 추가금 안내
    const hasExtra = String(act['추가비용여부']).toUpperCase() === 'TRUE';
    if (hasExtra && act['추가비용안내']) {
      const parts = act['추가비용안내'].split('|').map(s => s.trim()).filter(Boolean);
      const icons = ['🏦', '👤', '📱', '💰'];
      noticeBox.innerHTML = parts.map((p, i) =>
        `<div style="margin-bottom:4px;">${icons[i] || '•'} ${p}</div>`
      ).join('');
      noticeBox.style.display = 'block';
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active',
        (i === 0 && tab === 'attend') ||
        (i === 1 && tab === 'pre') ||
        (i === 2 && tab === 'my')
      );
    });
    document.getElementById('section-attend').classList.toggle('active', tab === 'attend');
    document.getElementById('section-pre').classList.toggle('active', tab === 'pre');
    document.getElementById('section-my').classList.toggle('active', tab === 'my');
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg ' + type;
  }

async function submitAttend() {
  const activityId = document.getElementById('attend-activity').value;
  const name = document.getElementById('attend-name').value.trim();
  const phone4 = document.getElementById('attend-phone').value.trim();
  if (!activityId) { showMsg('attend-msg', '활동을 선택해주세요.', 'error'); return; }
  if (!name || phone4.length !== 4) { showMsg('attend-msg', '이름과 전화번호 뒷 4자리를 정확히 입력해주세요.', 'error'); return; }
  const checkedItems = [...document.querySelectorAll('#sub-activity-list input:checked')]
    .map(el => el.value).join(',');
  const btn = document.querySelector('#section-attend .btn');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const check = await api({ action: 'checkAttendance', name, phone4, activityId, generation: CONFIG.GENERATION });
    if (!check.success) {
      showMsg('attend-msg', check.message, 'error');
      btn.disabled = false; btn.textContent = '출석 완료';
      return;
    }
    const submit = await api({
      action: 'submitAttendance', name, phone4, activityId,
      subActivity: checkedItems, generation: CONFIG.GENERATION, isDaily: false
    });
    if (submit.success) {
      document.getElementById('attend-form').style.display = 'none';
      document.getElementById('attend-success').classList.add('show');
      const act = allActivities.find(a => a['활동ID'] === activityId);
      const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('attend-info').innerHTML = `
        <div class="info-row"><span>이름</span><span>${name}</span></div>
        <div class="info-row"><span>활동</span><span>${act ? act['활동명'] : activityId}</span></div>
        <div class="info-row"><span>시간</span><span>${now}</span></div>
        ${checkedItems ? `<div class="info-row"><span>참여항목</span><span>${checkedItems}</span></div>` : ''}`;
    } else {
      showMsg('attend-msg', submit.message, 'error');
      btn.disabled = false; btn.textContent = '출석 완료';
    }
  } catch(e) {
    showMsg('attend-msg', '오류가 발생했습니다. 다시 시도해주세요.', 'error');
    btn.disabled = false; btn.textContent = '출석 완료';
  }
}

async function submitPre() {
  const activityId = document.getElementById('pre-activity').value;
  const name = document.getElementById('pre-name').value.trim();
  const phone4 = document.getElementById('pre-phone').value.trim();
  if (!activityId) { showMsg('pre-msg', '활동을 선택해주세요.', 'error'); return; }
  if (!name || phone4.length !== 4) { showMsg('pre-msg', '이름과 전화번호 뒷 4자리를 정확히 입력해주세요.', 'error'); return; }
  const btn = document.querySelector('#section-pre .btn');
  btn.disabled = true; btn.textContent = '신청 중...';
  try {
    const checkedPreSubItems = [...document.querySelectorAll('#pre-sub-list input:checked')]
      .map(el => el.value).join(',');
    const res = await api({ action: 'preRegister', name, phone4, activityId, subItems: checkedPreSubItems, generation: CONFIG.GENERATION });
    if (res.success) {
      document.getElementById('pre-form').style.display = 'none';
      document.getElementById('pre-success').classList.add('show');
    } else {
      showMsg('pre-msg', res.message, 'error');
      btn.disabled = false; btn.textContent = '신청 완료';
    }
  } catch(e) {
    showMsg('pre-msg', '오류가 발생했습니다. 다시 시도해주세요.', 'error');
    btn.disabled = false; btn.textContent = '신청 완료';
  }
}

let myStatusData = null;

async function loadMyStatus() {
  const name = document.getElementById('my-name').value.trim();
  const phone4 = document.getElementById('my-phone').value.trim();
  if (!name || phone4.length !== 4) {
    showMsg('my-msg', '이름과 전화번호 뒷 4자리를 입력해주세요.', 'error'); return;
  }
  const btn = document.querySelector('#section-my .btn');
  btn.disabled = true; btn.textContent = '조회 중...';
  try {
    const res = await api({ action: 'getMemberStatus', name, phone4 });
    if (!res.success) {
      showMsg('my-msg', res.message, 'error');
      btn.disabled = false; btn.textContent = '조회하기';
      return;
    }
    myStatusData = { ...res, name, phone4 };
    document.getElementById('my-form').style.display = 'none';
    document.getElementById('my-status').style.display = 'block';
    document.getElementById('my-name-display').textContent =
      res.member.name + '님' + (res.member.isNew ? ' ❤️' : '');
    renderMyGenList();
  } catch(e) {
    showMsg('my-msg', '오류가 발생했습니다. 다시 시도해주세요.', 'error');
    btn.disabled = false; btn.textContent = '조회하기';
  }
}

function renderMyGenList() {
  const container = document.getElementById('my-gen-list');
  const { generations, generationStats, preRegistered, attended, name, phone4 } = myStatusData;
  container.innerHTML = generations.slice().sort((a, b) => Number(b) - Number(a)).map(gen => {
    const stat = generationStats[gen] || { total: 0, attended: 0 };
    return `
      <div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleMyGen('${gen}')">
          <div class="list-item-title">${gen}기</div>
          <span class="status-badge badge-green">${stat.total}회 중 ${stat.attended}회 출석</span>
        </div>
        <div id="my-gen-detail-${gen}" style="display:none; margin-top:12px; border-top:1px solid #eee; padding-top:12px;">
          <p style="font-size:13px; color:#666; margin-bottom:8px; font-weight:500;">📋 사전신청 현황</p>
          ${renderMyPreList(preRegistered.filter(r => r.generation === gen), name, phone4)}
          <p style="font-size:13px; color:#666; margin-top:16px; margin-bottom:8px; font-weight:500;">✅ 출석 현황</p>
          ${renderMyAttList(attended.filter(r => r.generation === gen))}
        </div>
      </div>`;
  }).join('');
}

function renderMyPreList(items, name, phone4) {
  if (items.length === 0) return '<div class="empty-state">신청한 활동이 없어요</div>';
  return items.map(r => `
    <div class="status-card">
      <div class="status-card-title">
        ${r.activityName}
        <span class="status-badge ${r.paid ? 'badge-green' : 'badge-red'}">
          ${r.paid ? '납부완료' : '미납'}
        </span>
      </div>
      <button onclick="cancelPre('${r.activityId}', '${name}', '${phone4}')"
        style="font-size:12px; color:#E24B4A; background:none; border:none; cursor:pointer; margin-top:4px;">
        신청 취소
      </button>
    </div>`).join('');
}

function renderMyAttList(items) {
  if (items.length === 0) return '<div class="empty-state">출석한 활동이 없어요</div>';
  return items.map(r => `
    <div class="status-card">
      <div class="status-card-title">
        ${r.activityName}
        <span class="status-badge badge-green">출석</span>
      </div>
      <div style="font-size:12px; color:#888; margin-top:2px;">${r.time}</div>
    </div>`).join('');
}

function toggleMyGen(gen) {
  const el = document.getElementById(`my-gen-detail-${gen}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

  async function cancelPre(activityId, name, phone4) {
    if (!confirm('정말 신청을 취소할까요?')) return;
    try {
      const res = await api({ action: 'cancelPreRegister', name, phone4, activityId });
      if (res.success) {
        await loadMyStatus();
      } else {
        alert(res.message);
      }
    } catch(e) {
      alert('오류가 발생했습니다.');
    }
  }

function resetMyPage() {
  document.getElementById('my-form').style.display = 'block';
  document.getElementById('my-status').style.display = 'none';
  document.getElementById('my-name').value = '';
  document.getElementById('my-phone').value = '';
  document.getElementById('my-gen-list').innerHTML = '';
  myStatusData = null;
  const btn = document.querySelector('#section-my .btn');
  btn.disabled = false; btn.textContent = '조회하기';
  const msg = document.getElementById('my-msg');
  msg.className = 'msg'; msg.textContent = '';
}

  loadActivities();
</script>
</body>
</html>
